{% extends "base.html" %}
{% block body_class %}no-scroll{% endblock %}
{% block content %}
<div class="login-wrapper">
  <div class="login-left fade-in">
    <div>
    <h1>Smarter Recovery Starts Here</h1>
    <p>CureNet AI helps you monitor and improve patient progress effortlessly.</p>
      <div id="login-animation" style="width: 300px; height: 300px; margin: 0 auto;"></div>
    </div>
  </div>

  <div class="login-right">
    <div class="login-card fade-in">
      <h3 class="mb-3">Login</h3>

      <form method="post" action="{{ url_for('login') }}">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
          </div>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-primary">Login</button>
        </div>
      </form>

      <div class="mt-3 text-center login-links">
        <a href="{{ url_for('register') }}">Create an account</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
